name: Update Package

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update package
        # default is the flake attribute name; --build fetches and updates
        # the pnpmDeps hash in addition to the source hash
        run: nix shell nixpkgs#nix-update -c nix-update default --flake --version=stable --use-github-releases --build

      - name: Build package
        run: nix build .#default

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-package
          commit-message: "chore: update dmux package"
          title: "chore: update dmux package"
          body: |
            Automated package update generated by `nix-update`.
